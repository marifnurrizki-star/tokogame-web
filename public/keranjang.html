<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-STORE | Keranjang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .swal2-popup { background: #111113 !important; color: #dae2fd !important; border: 1px solid rgba(0, 212, 255, 0.3) !important; border-radius: 1rem !important; }
        .swal2-title, .swal2-html-container { color: #fff !important; font-family: 'Space Grotesk', sans-serif !important; }
        .swal2-confirm { background: #00d4ff !important; color: #000 !important; font-weight: bold !important; border-radius: 0.5rem !important; padding: 0.5rem 1.5rem !important; }
        .swal2-cancel { background: #182033 !important; color: #fff !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; border-radius: 0.5rem !important; padding: 0.5rem 1.5rem !important; }
    </style>
    <style>
        body { background-color: #0a0a0b; color: #e5e2e3; font-family: 'Space Grotesk', sans-serif; background-image: radial-gradient(circle at 2px 2px, rgba(0, 212, 255, 0.03) 1px, transparent 0); background-size: 24px 24px; }
        .glass-nav { background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .cyber-item { background: #131314; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .cyber-item:hover { border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <nav class="sticky top-0 z-50 glass-nav h-20 shadow-[0_0_15px_rgba(0,212,255,0.1)]">
        <div class="h-full max-w-[1280px] mx-auto px-6 flex justify-between items-center">
            <div class="flex flex-col">
                <a href="/index.html" class="text-2xl font-bold text-[#00d4ff] tracking-tighter leading-none">NEO-STORE</a>
                <span id="user-greeting" class="text-xs text-gray-400 mt-1 hidden">Hi, <span id="user-name-display" class="text-white font-bold"></span></span>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="window.history.back()" class="text-gray-400 hover:text-[#00d4ff] transition">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <button onclick="window.location.href='/setting.html'" class="text-gray-400 hover:text-[#00d4ff] transition" title="Pengaturan Akun">
                    <span class="material-symbols-outlined">manage_accounts</span>
                </button>
                <button id="btn-logout" class="px-4 py-2 border border-red-500/50 text-red-500 rounded hover:bg-red-500 hover:text-white transition-colors text-sm font-bold tracking-wider" onclick="logoutUser()">LOGOUT</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-[1280px] mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold text-white mb-8 uppercase tracking-wide">Keranjang Belanja</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Daftar Item -->
            <div class="lg:col-span-2">
                <div id="keranjang-list" class="space-y-4">
                    <div class="text-gray-500 text-center py-8 animate-pulse">
                        <span class="material-symbols-outlined" style="font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.5;">shopping_cart</span>
                        Memuat keranjang Anda...
                    </div>
                </div>
            </div>

            <!-- Ringkasan Pembelian -->
            <div class="lg:col-span-1">
                <div class="cyber-item rounded-lg p-6 sticky top-28">
                    <h2 class="text-xl font-bold text-white mb-4 uppercase tracking-widest">Ringkasan</h2>
                    
                    <div class="space-y-3 border-b border-gray-700 pb-4 mb-4">
                        <div class="flex justify-between text-gray-400">
                            <span>Subtotal</span>
                            <span id="subtotal">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-gray-400">
                            <span>Total Item</span>
                            <span id="total-items">0</span>
                        </div>
                    </div>

                    <div class="flex justify-between text-xl font-bold text-white mb-6">
                        <span>Total:</span>
                        <span id="total-harga" class="text-[#00d4ff]">Rp 0</span>
                    </div>

                    <button onclick="lanjutCheckout()" id="btn-checkout" class="w-full py-3 bg-[#00d4ff] text-black font-bold tracking-widest rounded hover:bg-white transition-all uppercase mb-3" disabled>
                        Lanjut ke Checkout
                    </button>

                    <button onclick="window.location.href='/index.html'" class="w-full py-3 bg-white/5 text-[#00d4ff] border border-[#00d4ff]/30 font-bold tracking-widest rounded hover:bg-white/10 transition-all uppercase">
                        Lanjut Belanja
                    </button>

                    <button onclick="kosongkanKeranjang()" id="btn-kosongkan" class="w-full py-3 bg-red-500/10 text-red-500 border border-red-500/30 font-bold text-sm tracking-widest rounded hover:bg-red-500/20 transition-all uppercase mt-3" style="display: none;">
                        <span class="material-symbols-outlined text-sm" style="vertical-align: middle; margin-right: 4px;">delete</span> Kosongkan Keranjang
                    </button>
                </div>
            </div>
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="text-gray-600 mb-6 bg-gray-900/50 p-6 rounded-full border border-gray-800">
                <span class="material-symbols-outlined" style="font-size: 64px;">shopping_cart_off</span>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2 uppercase tracking-widest">Keranjang Kosong</h2>
            <p class="text-gray-400 mb-8">Belum ada produk yang Anda tambahkan ke keranjang.</p>
            <a href="/index.html" class="px-8 py-3 bg-[#00d4ff]/10 text-[#00d4ff] border border-[#00d4ff]/50 rounded hover:bg-[#00d4ff] hover:text-black transition-all uppercase font-bold text-sm tracking-wider">Kembali ke Katalog</a>
        </div>
    </main>

    <footer class="bg-[#131314] border-t border-white/10 py-8 mt-auto">
        <div class="max-w-[1280px] mx-auto px-6 flex justify-between items-center">
            <div class="text-gray-400 text-sm"><span class="font-bold text-white mr-2">NEO-STORE</span> | Cyberpunk Gaming Hub</div>
            <div class="text-gray-500 text-xs font-bold tracking-widest">© 2026 NEO-STORE.</div>
        </div>
    </footer>

    <script>
        // --- MESIN TOAST ---
        function showNotif(pesan, tipe = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let borderColor = 'border-[#00d4ff]';
            let bgColor = 'bg-[#00d4ff]/10';
            let icon = 'check_circle';
            let iconColor = 'text-[#00d4ff]';
            let shadow = 'shadow-[0_0_15px_rgba(0,212,255,0.2)]';

            if (tipe === 'error') {
                borderColor = 'border-red-500'; bgColor = 'bg-red-500/10'; icon = 'warning'; iconColor = 'text-red-500'; shadow = 'shadow-[0_0_15px_rgba(239,68,68,0.2)]';
            }

            toast.className = `flex items-center gap-4 bg-[#111113] border ${borderColor} ${bgColor} p-4 rounded-lg ${shadow} transform transition-all duration-300 translate-x-[120%] opacity-0 pointer-events-auto`;
            toast.innerHTML = `<span class="material-symbols-outlined ${iconColor} text-2xl">${icon}</span><p class="text-white text-sm font-bold tracking-wide">${pesan}</p>`;
            container.appendChild(toast);

            setTimeout(() => { toast.classList.remove('translate-x-[120%]', 'opacity-0'); toast.classList.add('translate-x-0', 'opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('translate-x-0', 'opacity-100'); toast.classList.add('translate-x-[120%]', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- CEK LOGIN & LOAD KERANJANG ---
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('userTokoGame');
            if (!userData) {
                window.location.href = '/index.html';
                return;
            }
            document.getElementById('btn-logout').style.display = 'block';
            
            const user = JSON.parse(userData);
            const greeting = document.getElementById('user-greeting');
            if(greeting) {
                greeting.classList.remove('hidden');
                document.getElementById('user-name-display').innerText = user.nama;
            }
            
            muatKeranjang();
        });

        // --- MUAT KERANJANG DARI DATABASE ---
        async function muatKeranjang() {
            const userData = localStorage.getItem('userTokoGame');
            const token = localStorage.getItem('tokenTokoGame');
            if (!userData || !token) return;

            const user = JSON.parse(userData);
            try {
                const res = await fetch(`/api/cart/${user.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if(res.status === 401 || res.status === 403) {
                    logoutUser();
                    return;
                }

                const cartItems = await res.json();

                if (cartItems.length === 0) {
                    tampilkanKosong();
                    return;
                }

                renderKeranjang(cartItems);
                hitungTotal(cartItems);
            } catch (err) {
                console.error('Error muat keranjang:', err);
                showNotif('Gagal memuat keranjang!', 'error');
            }
        }

        // --- RENDER ITEM KERANJANG ---
        function renderKeranjang(items) {
            const wadah = document.getElementById('keranjang-list');
            const emptyState = document.getElementById('empty-state');
            
            wadah.innerHTML = '';
            emptyState.classList.add('hidden');
            document.getElementById('btn-kosongkan').style.display = 'block';

            items.forEach(item => {
                const hargaRp = new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR'}).format(item.harga);
                const subtotalRp = new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR'}).format(item.harga * item.jumlah);
                
                const linkGambar = item.gambar ? (item.gambar.startsWith('/') ? item.gambar : '/' + item.gambar) : 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=100&auto=format&fit=crop';
                
                wadah.innerHTML += `
                    <div class="cyber-item rounded-lg p-4 flex gap-4">
                        <img src="${linkGambar}" alt="${item.nama_produk}" class="w-24 h-24 object-cover rounded border border-gray-700" onerror="this.src='https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=100&auto=format&fit=crop'">
                        
                        <div class="flex-grow">
                            <h3 class="text-lg font-bold text-white mb-1">${item.nama_produk}</h3>
                            <p class="text-sm text-gray-400 mb-3">${item.kategori || 'GAME'}</p>
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-xs text-gray-500">Harga Satuan</p>
                                    <p class="text-lg font-bold text-[#00d4ff]">${hargaRp}</p>
                                </div>
                                <div class="flex items-center gap-2 bg-white/5 border border-gray-700 rounded px-3 py-1">
                                    <button onclick="ubahJumlah(${item.product_id}, -1)" class="text-gray-400 hover:text-white transition">
                                        <span class="material-symbols-outlined text-[18px]">remove</span>
                                    </button>
                                    <span class="w-8 text-center text-white font-bold">${item.jumlah}</span>
                                    <button onclick="ubahJumlah(${item.product_id}, 1)" class="text-gray-400 hover:text-white transition">
                                        <span class="material-symbols-outlined text-[18px]">add</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="text-right flex flex-col justify-between">
                            <button onclick="hapusItem(${item.product_id})" class="text-red-500 hover:text-red-400 transition">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                            <div>
                                <p class="text-xs text-gray-500">Subtotal</p>
                                <p class="text-lg font-bold text-white">${subtotalRp}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // --- HITUNG TOTAL ---
        function hitungTotal(items) {
            let total = 0;
            let totalJumlah = 0;
            items.forEach(item => {
                total += (item.harga * item.jumlah);
                totalJumlah += item.jumlah;
            });

            const totalRp = new Intl.NumberFormat('id-ID', {style:'currency', currency:'IDR'}).format(total);
            document.getElementById('subtotal').innerText = totalRp;
            document.getElementById('total-harga').innerText = totalRp;
            document.getElementById('total-items').innerText = totalJumlah;
            
            document.getElementById('btn-checkout').disabled = items.length === 0;
        }

        // --- TAMPILKAN KOSONG ---
        function tampilkanKosong() {
            document.getElementById('keranjang-list').innerHTML = '';
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('btn-kosongkan').style.display = 'none';
            document.getElementById('btn-checkout').disabled = true;
        }

        // --- UBAH JUMLAH ---
        async function ubahJumlah(product_id, arah) {
            const userData = localStorage.getItem('userTokoGame');
            const token = localStorage.getItem('tokenTokoGame');
            if (!userData || !token) return;
            const user = JSON.parse(userData);

            try {
                const res = await fetch(`/api/cart/${user.id}/${product_id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ perubahan: arah })
                });
                if (res.ok) muatKeranjang();
                else if(res.status === 401 || res.status === 403) logoutUser();
            } catch (err) {
                showNotif('Gagal ubah jumlah!', 'error');
            }
        }

        // --- HAPUS ITEM ---
        async function hapusItem(product_id) {
            const userData = localStorage.getItem('userTokoGame');
            const token = localStorage.getItem('tokenTokoGame');
            if (!userData || !token) return;
            const user = JSON.parse(userData);

            try {
                const res = await fetch(`/api/cart/${user.id}/${product_id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showNotif('Item dihapus dari keranjang', 'success');
                    muatKeranjang();
                } else if(res.status === 401 || res.status === 403) logoutUser();
            } catch (err) {
                showNotif('Gagal hapus item!', 'error');
            }
        }

        // --- KOSONGKAN SELURUH KERANJANG ---
        async function kosongkanKeranjang() {
            const { isConfirmed } = await Swal.fire({
                title: 'Kosongkan Keranjang?',
                text: 'Yakin ingin hapus semua item dari keranjang?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Ya, Kosongkan',
                cancelButtonText: 'Batal'
            });
            if (!isConfirmed) return;
            
            const userData = localStorage.getItem('userTokoGame');
            const token = localStorage.getItem('tokenTokoGame');
            if (!userData || !token) return;
            const user = JSON.parse(userData);

            try {
                const res = await fetch(`/api/cart/${user.id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showNotif('Keranjang telah dikosongkan', 'success');
                    muatKeranjang();
                } else if(res.status === 401 || res.status === 403) logoutUser();
            } catch (err) {
                showNotif('Gagal kosongkan keranjang!', 'error');
            }
        }

        // --- LANJUT CHECKOUT ---
        function lanjutCheckout() {
            window.location.href = '/shipping.html';
        }

        // --- LOGOUT ---
        function logoutUser() {
            localStorage.removeItem('userTokoGame');
            location.reload();
        }
    </script>
</body>
</html>
