<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-STORE | Lupa Kata Sandi</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#00d4ff",
                        "on-surface-variant": "#bbc9cf",
                        "surface-container-high": "#222a3d",
                        "surface-container-low": "#131b2e",
                        "on-surface": "#dae2fd",
                        "outline-variant": "#3c494e",
                        "on-primary": "#003642",
                        "outline": "#859398"
                    },
                    "fontFamily": {
                        "display-lg": ["Space Grotesk"],
                        "headline-lg-mobile": ["Space Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "headline-md": ["Space Grotesk"],
                        "label-sm": ["JetBrains Mono"],
                        "body-lg": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "body-md": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0b1326;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0, 212, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .cyber-border {
            position: relative;
            border: 1px solid #334155;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .cyber-border:focus-within {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        .circuit-line {
            position: absolute;
            background: #00d4ff;
            opacity: 0.3;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface overflow-hidden">
    
    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_50%_50%,_#00d4ff_0%,_transparent_50%)]"></div>
        <div class="circuit-line h-px w-32 top-10 left-10"></div>
        <div class="circuit-line w-px h-32 top-10 left-10"></div>
        <div class="circuit-line h-px w-32 bottom-10 right-10"></div>
        <div class="circuit-line w-px h-32 bottom-10 right-10"></div>
    </div>

    <main class="relative z-10 w-full max-w-[420px] px-margin-mobile">
        <div class="bg-surface-container-low border border-outline-variant p-10 rounded-lg backdrop-blur-md shadow-2xl relative">
            <div class="absolute -top-px -left-px w-4 h-4 border-t-2 border-l-2 border-primary-container"></div>
            <div class="absolute -bottom-px -right-px w-4 h-4 border-b-2 border-r-2 border-primary-container"></div>
            
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-primary-container/10 border border-primary-container/30 rounded-full flex items-center justify-center mb-6 neon-glow">
                    <span class="material-symbols-outlined text-primary-container text-[32px]">lock_reset</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-center tracking-tight mb-2">
                    Lupa Kata Sandi
                </h1>
                <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest opacity-60 text-center">
                    MASUKKAN EMAIL ANDA UNTUK MENERIMA TAUTAN RESET
                </p>
            </div>
            
            <form id="form-forgot" class="space-y-6">
                <div class="space-y-2">
                    <label class="font-label-md text-label-md text-primary-container block ml-1" for="email">
                        EMAIL TERDAFTAR
                    </label>
                    <div class="cyber-border bg-surface-container-high rounded-sm">
                        <input class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 px-4 font-body-md placeholder:text-outline/50" id="email" name="email" placeholder="email@contoh.com" required="" type="email"/>
                    </div>
                </div>
                
                <button class="w-full py-4 bg-primary-container hover:bg-primary-container/90 active:scale-[0.98] transition-all duration-200 text-on-primary font-label-md text-label-md font-bold uppercase tracking-[0.2em] rounded-sm neon-glow" type="submit">
                    Kirim Tautan Reset
                </button>
            </form>
            
            <div class="mt-10 pt-8 border-t border-outline-variant/30 text-center">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    <a class="text-primary-container font-medium hover:underline underline-offset-4 decoration-primary-container/50 flex items-center justify-center gap-1" href="/login.html">
                        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                        Kembali ke Login
                    </a>
                </p>
            </div>
        </div>
        <p class="text-center mt-8 font-label-sm text-label-sm text-outline uppercase tracking-tighter opacity-40">
            © 2026 NEO-STORE SECURE ACCESS
        </p>
    </main>

    <script>
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('main');
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                container.style.setProperty('--mouse-x', `${x}px`);
                container.style.setProperty('--mouse-y', `${y}px`);
            }
        });

        function showNotif(pesan, tipe = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let borderColor = 'border-[#00d4ff]';
            let bgColor = 'bg-[#00d4ff]/10';
            let icon = 'check_circle';
            let iconColor = 'text-[#00d4ff]';
            let shadow = 'shadow-[0_0_15px_rgba(0,212,255,0.2)]';

            if (tipe === 'error') {
                borderColor = 'border-red-500'; bgColor = 'bg-red-500/10'; icon = 'warning'; iconColor = 'text-red-500'; shadow = 'shadow-[0_0_15px_rgba(239,68,68,0.2)]';
            }

            toast.className = `flex items-center gap-4 bg-[#111113] border ${borderColor} ${bgColor} p-4 rounded-lg ${shadow} transform transition-all duration-300 translate-x-[120%] opacity-0 pointer-events-auto`;
            toast.innerHTML = `<span class="material-symbols-outlined ${iconColor} text-2xl">${icon}</span><p class="text-white text-sm font-bold tracking-wide">${pesan}</p>`;
            container.appendChild(toast);

            setTimeout(() => { toast.classList.remove('translate-x-[120%]', 'opacity-0'); toast.classList.add('translate-x-0', 'opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('translate-x-0', 'opacity-100'); toast.classList.add('translate-x-[120%]', 'opacity-0'); setTimeout(() => toast.remove(), 5000); }, 5000);
        }

        document.getElementById('form-forgot').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'MENGIRIM...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotif('Tautan reset berhasil dikirim ke email Anda. Silakan periksa inbox atau folder spam.', 'success');
                    document.getElementById('email').value = '';
                } else {
                    showNotif(data.message, 'error');
                }
            } catch(err) {
                showNotif('Server Error!', 'error');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
