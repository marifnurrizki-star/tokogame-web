<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-STORE | SHIPPING PROTOCOL</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Geist:wght@100;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3cd7ff", // Warna neon blue
                        "on-primary": "#003642",
                        "primary-container": "#00d4ff",
                        "on-primary-container": "#00586b",
                        "background": "#0a0a0b", // Background sangat gelap
                        "surface": "#131314",
                        "surface-container": "#201f20",
                        "surface-container-low": "#1c1b1c",
                        "on-surface": "#e5e2e3",
                        "on-surface-variant": "#bbc9cf",
                        "outline": "#859398",
                        "outline-variant": "#3c494e"
                    },
                    spacing: { "container-max": "1440px", "gutter": "24px", "md": "24px", "lg": "48px", "base": "8px", "xs": "4px", "sm": "12px" },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Geist", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0a0a0b; color: #e5e2e3; font-family: 'Geist', sans-serif; overflow-x: hidden; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        
        /* Efek Background Circuit */
        .circuit-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(0, 212, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* Efek Kaca (Glassmorphism) */
        .glass-panel {
            background: rgba(19, 19, 20, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* Neon Border Glow saat fokus */
        .neon-input:focus-within {
            border-color: #3cd7ff;
            box-shadow: 0 0 15px rgba(60, 215, 255, 0.3);
        }

        /* Custom Scrollbar untuk Textarea */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3cd7ff; border-radius: 10px; }

        /* Efek Teks Glowing */
        .glow-text { text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }

        /* Efek Sinar Gradient di Tombol */
        .cyber-button { position: relative; overflow: hidden; transition: all 0.3s ease; }
        .cyber-button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: 0.5s; }
        .cyber-button:hover::before { left: 100%; }
        
        /* Garis Bersinar Top NavBar */
        .nav-glow { box-shadow: 0 0 15px rgba(60, 215, 255, 0.1); }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col circuit-bg">

    <header class="fixed top-0 w-full z-50 bg-surface/75 backdrop-blur-xl border-b border-white/10 nav-glow">
        <div class="flex justify-between items-center h-[70px] px-md lg:px-lg max-w-container-max mx-auto w-full">
            <div class="flex flex-col">
                <div class="font-headline text-3xl font-bold text-primary tracking-tighter leading-none">NEO-STORE</div>
                <span id="user-greeting" class="text-xs text-on-surface-variant mt-1 hidden">Hi, <span id="user-name-display" class="text-white font-bold"></span></span>
            </div>
            <nav class="hidden md:flex gap-lg items-center">
                <!-- Navigation links removed as requested -->
            </nav>
            <div class="flex gap-md items-center">
                <button onclick="window.location.href='/index.html'" class="material-symbols-outlined text-on-surface-variant hover:text-primary hover:bg-white/5 p-2 rounded-full transition-all active:scale-95">shopping_cart</button>
                <div class="relative group">
                    <button class="p-2 text-on-surface-variant hover:text-primary hover:bg-white/5 rounded-full transition-all active:scale-95"><span class="material-symbols-outlined">account_circle</span></button>
                    <div class="absolute right-0 mt-2 w-56 glass-panel border border-white/10 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 p-2">
                        <a href="/riwayat.html" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-on-surface hover:text-primary hover:bg-white/5 rounded transition-colors mb-1"><span class="material-symbols-outlined text-sm">history</span> Transaction History</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-[110px] pb-xl px-4 md:px-lg max-w-[1280px] mx-auto w-full">
        
        <div class="flex items-center gap-base mb-8 px-2 overflow-x-auto no-scrollbar">
            <span class="font-body text-xs text-on-surface-variant uppercase tracking-widest flex items-center gap-xs">Cart <span class="text-on-surface-variant/30 text-base">/</span></span>
            <span class="font-body text-xs text-primary font-bold uppercase tracking-widest glow-text flex items-center gap-xs">Shipping Protocol <span class="text-on-surface-variant/30 text-base">/</span></span>
            <span class="font-body text-xs text-on-surface-variant opacity-50 uppercase tracking-widest flex items-center gap-xs">Payment</span>
        </div>

        <div class="glass-panel p-md lg:p-xl border-primary/20 relative overflow-hidden rounded-xl">
            <div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-primary rounded-tl-xl pointer-events-none"></div>
            <div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-primary rounded-br-xl pointer-events-none"></div>
            
            <h1 class="font-headline text-4xl lg:text-5xl font-bold mb-10 text-on-surface tracking-tighter uppercase">Shipping Information</h1>
            
            <form id="form-shipping" class="space-y-gutter">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                    <div class="space-y-xs group neon-input">
                        <label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Nama Lengkap</label>
                        <div class="relative">
                            <input id="ship-nama" class="w-full bg-white/5 border border-white/10 p-4 font-body text-base text-on-surface focus:ring-0 focus:outline-none focus:border-primary transition-all rounded" type="text" placeholder="Masukkan nama..." required/>
                            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline opacity-40">person</span>
                        </div>
                    </div>
                    <div class="space-y-xs group neon-input">
                        <label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Nomor HP (WhatsApp)</label>
                        <div class="relative">
                            <input id="ship-hp" class="w-full bg-white/5 border border-white/10 p-4 font-body text-base text-on-surface focus:ring-0 focus:outline-none focus:border-primary transition-all rounded" type="text" placeholder="0812..." required/>
                            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline opacity-40">call</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-xs group neon-input">
                    <label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Alamat Lengkap</label>
                    <textarea id="ship-alamat" class="w-full bg-white/5 border border-white/10 p-4 font-body text-base text-on-surface focus:ring-0 focus:outline-none focus:border-primary transition-all resize-none custom-scroll rounded" rows="4" placeholder="Jalan, RT/RW, Kota, Kode Pos..." required></textarea>
                </div>

                <div class="space-y-gutter">
                    <label class="font-label-md text-label-md text-on-surface-variant">Metode Pengiriman</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
                        
                        <label id="opt-kirim" class="relative flex items-center p-md cursor-pointer glass-panel border-white/5 hover:border-primary/50 transition-all rounded group">
                            <input checked class="peer hidden" name="shipping" type="radio" value="Kirim Paket"/>
                            <div class="w-5 h-5 border-2 border-outline rounded-sm flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary/20 transition-all">
                                <div class="w-2 h-2 bg-primary scale-0 peer-checked:scale-100 transition-transform"></div>
                            </div>
                            <div class="ml-4 flex-grow">
                                <p class="font-headline text-lg font-bold text-on-surface">Kirim Paket</p>
                                <p class="font-label-md text-sm text-on-surface-variant">Estimasi 2-3 hari kerja</p>
                            </div>
                            <span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity">local_shipping</span>
                        </label>
                        
                        <label id="opt-ambil" class="relative flex items-center p-md cursor-pointer glass-panel border-white/5 hover:border-primary/50 transition-all rounded group">
                            <input class="peer hidden" name="shipping" type="radio" value="Ambil Langsung"/>
                            <div class="w-5 h-5 border-2 border-outline rounded-sm flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary/20 transition-all">
                                <div class="w-2 h-2 bg-primary scale-0 peer-checked:scale-100 transition-transform"></div>
                            </div>
                            <div class="ml-4 flex-grow">
                                <p class="font-headline text-lg font-bold text-on-surface">Ambil Langsung</p>
                                <p class="font-label-md text-sm text-on-surface-variant">Pick-up di Terminal Hub</p>
                            </div>
                            <span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity">location_on</span>
                        </label>
                        
                    </div>
                </div>

                <div class="space-y-xs group neon-input">
                    <label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors">Catatan (Opsional)</label>
                    <input id="ship-catatan" class="w-full bg-white/5 border border-white/10 p-4 font-body text-base text-on-surface focus:ring-0 focus:outline-none focus:border-primary transition-all rounded" type="text" placeholder="Tolong bubble wrap ya..."/>
                </div>

                <div class="flex flex-col md:flex-row justify-between items-center gap-md pt-lg border-t border-white/5">
                    <button onclick="window.location.href='/index.html'" class="flex items-center gap-xs font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors group" type="button">
                        <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span> KEMBALI
                    </button>
                    <button class="cyber-button w-full md:w-auto bg-primary-container text-on-primary-container px-12 py-4 font-headline text-lg font-bold flex items-center justify-center gap-md shadow-[0_0_20px_rgba(0,212,255,0.4)] hover:shadow-[0_0_35px_rgba(0,212,255,0.6)] transition-all rounded active:scale-95" type="submit">
                        LANJUT KE PEMBAYARAN <span class="material-symbols-outlined">bolt</span>
                    </button>
                </div>
            </form>
        </div>
        
        <div class="mt-xl flex justify-center items-center gap-lg opacity-40">
            <div class="flex items-center gap-xs"><span class="material-symbols-outlined text-sm">lock</span><span class="font-label-sm text-xs">SECURE ENCRYPTION</span></div>
            <div class="flex items-center gap-xs"><span class="material-symbols-outlined text-sm">verified_user</span><span class="font-label-sm text-xs">DATA PROTECTION</span></div>
        </div>
        
    </main>

    <footer class="w-full border-t border-white/5 bg-surface-container-lowest mt-auto">
        <div class="flex flex-col md:flex-row justify-between items-center px-lg py-xl gap-md max-w-container-max mx-auto w-full">
            <div class="space-y-xs text-center md:text-left">
                <div class="font-headline text-xl text-on-surface font-bold">NEO-STORE</div>
                <p class="font-label-md text-sm text-on-surface-variant">© 2026 NEO-STORE DIGITAL INDUSTRIES. ALL SYSTEMS OPERATIONAL.</p>
            </div>
            <div class="flex gap-lg flex-wrap justify-center text-sm">
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">PRIVACY_PROTOCOL</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">TERMINAL_TERMS</a>
                <a class="text-on-surface-variant hover:text-primary transition-colors" href="#">SUPPORT_ACCESS</a>
            </div>
        </div>
    </footer>

    <script>
        // Show user greeting
        (function() {
            const userData = localStorage.getItem('userTokoGame');
            if (userData) {
                const user = JSON.parse(userData);
                const greeting = document.getElementById('user-greeting');
                if(greeting) {
                    greeting.classList.remove('hidden');
                    document.getElementById('user-name-display').innerText = user.nama;
                }
            }
        })();
        
        // Logika untuk ganti gaya radio button Kirim/Ambil
        const shipMethods = document.querySelectorAll('input[name="shipping"]');
        const labels = {
            'Kirim Paket': document.getElementById('opt-kirim'),
            'Ambil Langsung': document.getElementById('opt-ambil')
        };

        function updateRadioStyles() {
            shipMethods.forEach(radio => {
                const label = labels[radio.value];
                if (radio.checked) {
                    label.classList.add('border-primary');
                    label.classList.remove('border-white/5');
                } else {
                    label.classList.remove('border-primary');
                    label.classList.add('border-white/5');
                }
            });
            
            const alamatInput = document.getElementById('ship-alamat');
            const metodeKirim = document.querySelector('input[name="shipping"]:checked');
            if (metodeKirim && metodeKirim.value === 'Ambil Langsung') {
                alamatInput.required = false;
                alamatInput.disabled = true;
                alamatInput.classList.add('opacity-50', 'cursor-not-allowed');
                alamatInput.placeholder = 'Tidak perlu diisi untuk Ambil Langsung';
            } else {
                alamatInput.required = true;
                alamatInput.disabled = false;
                alamatInput.classList.remove('opacity-50', 'cursor-not-allowed');
                alamatInput.placeholder = 'Jalan, RT/RW, Kota, Kode Pos...';
            }
        }
        
        shipMethods.forEach(radio => radio.addEventListener('change', updateRadioStyles));
        updateRadioStyles(); // Jalankan sekali saat load


        // LOGIKA PENGIRIMAN FORM KE PAYMENT.HTML
        document.getElementById('form-shipping').addEventListener('submit', (e) => {
            e.preventDefault(); // Mencegah reload halaman
            const btn = e.target.querySelector('button[type="submit"]');
            
            // 1. Ambil Data Form
            const nama = document.getElementById('ship-nama').value;
            const hp = document.getElementById('ship-hp').value;
            const alamat = document.getElementById('ship-alamat').value;
            const catatan = document.getElementById('ship-catatan').value;
            const metodeKirim = document.querySelector('input[name="shipping"]:checked').value;

            // 2. Bungkus jadi objek
            const shippingData = {
                nama_penerima: nama,
                no_hp: hp,
                alamat: alamat,
                catatan: catatan,
                metode_pengiriman: metodeKirim
            };

            // 3. Simpan sementara di Local Storage (Estafet Data)
            localStorage.setItem('tempShippingData', JSON.stringify(shippingData));

            // 4. Efek Animasi & Pindah Halaman
            btn.innerHTML = 'ESTABLISHING CONNECTION... <span class="material-symbols-outlined animate-spin">refresh</span>';
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            setTimeout(() => {
                window.location.href = '/payment.html'; // Tembak ke halaman pembayaran
            }, 1000);
        });
    </script>
</body>
</html>
