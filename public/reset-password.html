<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NEO-STORE | Reset Kata Sandi</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#00d4ff",
                        "on-surface-variant": "#bbc9cf",
                        "surface-container-high": "#222a3d",
                        "surface-container-low": "#131b2e",
                        "on-surface": "#dae2fd",
                        "outline-variant": "#3c494e",
                        "on-primary": "#003642",
                        "outline": "#859398"
                    },
                    "fontFamily": {
                        "display-lg": ["Space Grotesk"],
                        "headline-lg-mobile": ["Space Grotesk"],
                        "label-md": ["JetBrains Mono"],
                        "headline-md": ["Space Grotesk"],
                        "label-sm": ["JetBrains Mono"],
                        "body-lg": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "body-md": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0b1326;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0, 212, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .cyber-border {
            position: relative;
            border: 1px solid #334155;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .cyber-border:focus-within {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        .circuit-line {
            position: absolute;
            background: #00d4ff;
            opacity: 0.3;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface overflow-hidden">
    
    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_50%_50%,_#00d4ff_0%,_transparent_50%)]"></div>
        <div class="circuit-line h-px w-32 top-10 left-10"></div>
        <div class="circuit-line w-px h-32 top-10 left-10"></div>
        <div class="circuit-line h-px w-32 bottom-10 right-10"></div>
        <div class="circuit-line w-px h-32 bottom-10 right-10"></div>
    </div>

    <main class="relative z-10 w-full max-w-[420px] px-margin-mobile">
        <div class="bg-surface-container-low border border-outline-variant p-10 rounded-lg backdrop-blur-md shadow-2xl relative">
            <div class="absolute -top-px -left-px w-4 h-4 border-t-2 border-l-2 border-primary-container"></div>
            <div class="absolute -bottom-px -right-px w-4 h-4 border-b-2 border-r-2 border-primary-container"></div>
            
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-primary-container/10 border border-primary-container/30 rounded-full flex items-center justify-center mb-6 neon-glow">
                    <span class="material-symbols-outlined text-primary-container text-[32px]">key</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-center tracking-tight mb-2">
                    Reset Kata Sandi
                </h1>
                <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest opacity-60 text-center">
                    BUAT KATA SANDI BARU ANDA
                </p>
            </div>
            
            <form id="form-reset" class="space-y-6">
                <input type="hidden" id="token" name="token" value="">
                
                <div class="space-y-2">
                    <label class="font-label-md text-label-md text-primary-container block ml-1" for="password">
                        KATA SANDI BARU
                    </label>
                    <div class="cyber-border bg-surface-container-high rounded-sm flex items-center">
                        <input class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface py-3 px-4 font-body-md" id="password" name="password" required="" type="password" placeholder="••••••••" minlength="6"/>
                        <button class="px-4 text-on-surface-variant hover:text-primary-container transition-colors duration-200 focus:outline-none" onclick="togglePasswordVisibility('password', 'visibility-icon-1')" type="button">
                            <span class="material-symbols-outlined text-[20px]" id="visibility-icon-1">visibility</span>
                        </button>
                    </div>
                </div>
                
                <div class="space-y-2">
                    <label class="font-label-md text-label-md text-primary-container block ml-1" for="confirm_password">
                        KONFIRMASI KATA SANDI
                    </label>
                    <div class="cyber-border bg-surface-container-high rounded-sm flex items-center">
                        <input class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface py-3 px-4 font-body-md" id="confirm_password" name="confirm_password" required="" type="password" placeholder="••••••••" minlength="6"/>
                        <button class="px-4 text-on-surface-variant hover:text-primary-container transition-colors duration-200 focus:outline-none" onclick="togglePasswordVisibility('confirm_password', 'visibility-icon-2')" type="button">
                            <span class="material-symbols-outlined text-[20px]" id="visibility-icon-2">visibility</span>
                        </button>
                    </div>
                </div>
                
                <button class="w-full py-4 bg-primary-container hover:bg-primary-container/90 active:scale-[0.98] transition-all duration-200 text-on-primary font-label-md text-label-md font-bold uppercase tracking-[0.2em] rounded-sm neon-glow" type="submit">
                    Ubah Kata Sandi
                </button>
            </form>
            
            <div class="mt-10 pt-8 border-t border-outline-variant/30 text-center">
                <p class="font-body-md text-body-md text-on-surface-variant">
                    <a class="text-primary-container font-medium hover:underline underline-offset-4 decoration-primary-container/50 flex items-center justify-center gap-1" href="/login.html">
                        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                        Kembali ke Login
                    </a>
                </p>
            </div>
        </div>
        <p class="text-center mt-8 font-label-sm text-label-sm text-outline uppercase tracking-tighter opacity-40">
            © 2026 NEO-STORE SECURE ACCESS
        </p>
    </main>

    <script>
        // Ambil token dari URL URL?token=xyz
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('token').value = token;
        } else {
            showNotif('Token tidak ditemukan! Harap gunakan link dari email Anda.', 'error');
            document.getElementById('form-reset').querySelector('button').disabled = true;
        }

        function togglePasswordVisibility(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function showNotif(pesan, tipe = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let borderColor = 'border-[#00d4ff]';
            let bgColor = 'bg-[#00d4ff]/10';
            let icon = 'check_circle';
            let iconColor = 'text-[#00d4ff]';
            let shadow = 'shadow-[0_0_15px_rgba(0,212,255,0.2)]';

            if (tipe === 'error') {
                borderColor = 'border-red-500'; bgColor = 'bg-red-500/10'; icon = 'warning'; iconColor = 'text-red-500'; shadow = 'shadow-[0_0_15px_rgba(239,68,68,0.2)]';
            }

            toast.className = `flex items-center gap-4 bg-[#111113] border ${borderColor} ${bgColor} p-4 rounded-lg ${shadow} transform transition-all duration-300 translate-x-[120%] opacity-0 pointer-events-auto`;
            toast.innerHTML = `<span class="material-symbols-outlined ${iconColor} text-2xl">${icon}</span><p class="text-white text-sm font-bold tracking-wide">${pesan}</p>`;
            container.appendChild(toast);

            setTimeout(() => { toast.classList.remove('translate-x-[120%]', 'opacity-0'); toast.classList.add('translate-x-0', 'opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('translate-x-0', 'opacity-100'); toast.classList.add('translate-x-[120%]', 'opacity-0'); setTimeout(() => toast.remove(), 5000); }, 5000);
        }

        document.getElementById('form-reset').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            
            if (password !== confirm_password) {
                return showNotif('Konfirmasi kata sandi tidak cocok!', 'error');
            }

            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'MEMPROSES...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password })
                });
                const data = await res.json();
                
                if (data.success) {
                    showNotif('Kata sandi berhasil diubah! Mengarahkan ke login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showNotif(data.message, 'error');
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch(err) {
                showNotif('Server Error!', 'error');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
